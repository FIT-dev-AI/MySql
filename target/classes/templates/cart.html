<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .navbar { background: rgba(0,0,0,0.85) !important; backdrop-filter: blur(10px); }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; color: #4facfe !important; }
        .nav-link { color: #e0e0e0 !important; font-weight: 500; margin-left: 1rem; }
        .nav-link:hover { color: #4facfe !important; }
        .main-container { flex: 1; max-width: 900px; width: 100%; margin: 2rem auto; padding: 0 1rem 2rem; }
        .cart-container {
            background: white; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;
        }
        .cart-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 1.5rem 2rem;
        }
        .cart-header h2 { margin: 0; font-weight: 700; }
        .cart-body { padding: 2rem; }
        .cart-item {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 0; border-bottom: 1px solid #eee;
        }
        .cart-item:last-child { border-bottom: none; }
        .item-img {
            width: 70px; height: 50px; object-fit: cover;
            border-radius: 6px; border: 1px solid #ddd; flex-shrink: 0;
        }
        .item-img-placeholder {
            width: 70px; height: 50px; background: #e9ecef;
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; color: #999; font-size: 0.75rem; flex-shrink: 0;
        }
        .item-name { font-weight: 600; color: #333; flex: 1; }
        .item-price { color: #667eea; font-weight: 600; min-width: 90px; text-align: right; }
        .item-subtotal { color: #764ba2; font-weight: 700; min-width: 100px; text-align: right; }
        .qty-form { display: flex; align-items: center; gap: 0.4rem; }
        .qty-input {
            width: 60px; text-align: center; border: 1px solid #ddd;
            border-radius: 6px; padding: 0.3rem;
        }
        .btn-remove {
            background: #dc3545; color: white; border: none;
            padding: 0.35rem 0.75rem; border-radius: 6px;
            font-size: 0.85rem; cursor: pointer; text-decoration: none;
        }
        .btn-remove:hover { background: #c82333; color: white; }
        .cart-footer {
            background: #f8f9fa; padding: 1.5rem 2rem;
            border-top: 2px solid #eee;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
        }
        .total-text { font-size: 1.3rem; font-weight: 700; color: #333; }
        .total-amount { color: #764ba2; font-size: 1.5rem; }
        .empty-cart { text-align: center; padding: 3rem; color: #666; }
        .empty-cart-icon { font-size: 4rem; margin-bottom: 1rem; }
        .footer {
            background: rgba(0,0,0,0.85); color: #e0e0e0;
            text-align: center; padding: 1.5rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-lg">
        <a class="navbar-brand" href="/">🛒 Product Management</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
                <li class="nav-item"><a class="nav-link active" href="/cart">🛒 Giỏ hàng</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <span style="color:#e0e0e0; font-size:0.9rem;"
                      th:text="'👤 ' + ${#authentication.name}"></span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            style="background:#dc3545;color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Main -->
<div class="main-container">
    <div class="cart-container">
        <div class="cart-header">
            <h2>🛒 Giỏ hàng của bạn</h2>
        </div>

        <div class="cart-body">
            <!-- Có sản phẩm -->
            <div th:if="${#lists.size(cart) > 0}">
                <div class="cart-item" th:each="item : ${cart}">
                    <!-- Ảnh -->
                    <img th:if="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}"
                         th:src="${item.imageUrl}" th:alt="${item.productName}" class="item-img"
                         onerror="this.src='https://placehold.co/70x50/6C63FF/white?text=No';">
                    <div th:unless="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}"
                         class="item-img-placeholder">No img</div>

                    <!-- Tên -->
                    <span class="item-name" th:text="${item.productName}">Tên SP</span>

                    <!-- Giá đơn vị -->
                    <span class="item-price" th:text="'đ' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}">đ0</span>

                    <!-- Cập nhật số lượng -->
                    <form th:action="@{/cart/update/{id}(id=${item.productId})}"
                          method="post" class="qty-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="number" name="quantity" th:value="${item.quantity}"
                               min="1" max="99" class="qty-input">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">✔</button>
                    </form>

                    <!-- Thành tiền -->
                    <span class="item-subtotal" th:text="'đ' + ${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')}">đ0</span>

                    <!-- Xóa -->
                    <a th:href="@{/cart/remove/{id}(id=${item.productId})}"
                       class="btn-remove"
                       onclick="return confirm('Xóa sản phẩm này khỏi giỏ?')">🗑️</a>
                </div>
            </div>

            <!-- Giỏ trống -->
            <div th:unless="${#lists.size(cart) > 0}" class="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <p>Giỏ hàng trống</p>
                <a href="/products" class="btn btn-primary mt-2">🛍️ Tiếp tục mua sắm</a>
            </div>
        </div>

        <!-- Footer giỏ hàng -->
        <div th:if="${#lists.size(cart) > 0}" class="cart-footer">
            <div class="total-text">
                Tổng cộng:
                <span class="total-amount"
                      th:text="'đ' + ${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}">đ0</span>
            </div>
            <div class="d-flex gap-2">
                <a href="/products" class="btn btn-outline-secondary">🛍️ Tiếp tục mua</a>
                <a href="/checkout" class="btn btn-success px-4">✅ Đặt hàng</a>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2026 Product Management System. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
