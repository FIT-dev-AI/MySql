<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🛒 Product Management</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">🛒 Giỏ hàng</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <span style="color:white; font-size:0.9rem;"
                      th:text="'👤 ' + ${#authentication.name}"></span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            style="background:#dc3545;color:white;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:14px;font-weight:500;">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container text-center mt-5">
    <h1>🛒 Welcome to Product Management</h1>
    <p class="lead mt-2">Quản lý sản phẩm với Spring Boot &amp; Thymeleaf</p>
    <div class="mt-4 d-flex justify-content-center gap-3">
        <a href="/products" class="btn btn-primary btn-lg">📦 Xem sản phẩm</a>
        <a href="/cart" class="btn btn-success btn-lg">🛒 Giỏ hàng</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
