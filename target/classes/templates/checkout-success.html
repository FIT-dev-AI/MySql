<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .navbar { background: rgba(0,0,0,0.85) !important; }
        .navbar-brand { font-weight: 700; color: #4facfe !important; }
        .nav-link { color: #e0e0e0 !important; }
        .nav-link:hover { color: #4facfe !important; }
        .main-container {
            flex: 1; display: flex; align-items: center;
            justify-content: center; padding: 2rem;
        }
        .success-card {
            background: white; border-radius: 16px;
            padding: 3rem; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px; width: 100%;
        }
        .success-icon { font-size: 5rem; margin-bottom: 1rem; }
        .success-title { color: #28a745; font-weight: 700; font-size: 1.8rem; }
        .success-msg { color: #666; margin: 1rem 0 2rem; }
        .footer {
            background: rgba(0,0,0,0.85); color: #e0e0e0;
            text-align: center; padding: 1.5rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-lg">
        <a class="navbar-brand" href="/">🛒 Product Management</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">🛒 Giỏ hàng</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <span style="color:#e0e0e0; font-size:0.9rem;"
                      th:text="'👤 ' + ${#authentication.name}"></span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            style="background:#dc3545;color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:600;">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="main-container">
    <div class="success-card">
        <div class="success-icon">🎉</div>
        <h2 class="success-title">Đặt hàng thành công!</h2>
        <p class="success-msg">Cảm ơn bạn đã đặt hàng. Đơn hàng của bạn đang được xử lý.</p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="/products" class="btn btn-primary px-4">🛍️ Tiếp tục mua sắm</a>
        </div>
    </div>
</div>

<footer class="footer">
    <p>&copy; 2026 Product Management System. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
