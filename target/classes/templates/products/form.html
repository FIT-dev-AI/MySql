<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id == null} ? 'Thêm sản phẩm' : 'Sửa sản phẩm'">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Product Management</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Products</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <span th:text="'Hello, ' + ${#authentication.name}" 
                      style="color:white;margin-right:15px;"></span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" 
                        style="background:#dc3545;color:white;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:14px;font-weight:500;">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${product.id == null} ? 'Thêm sản phẩm' : 'Sửa sản phẩm'">Product Form</h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post" class="mt-3">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="name" class="form-label">Tên sản phẩm</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label for="price" class="form-label">Giá</label>
            <input type="number" class="form-control" id="price" th:field="*{price}" required step="any">
        </div>

        <div class="mb-3">
            <label for="imageUrl" class="form-label">URL hình ảnh</label>
            <input type="text" class="form-control" id="imageUrl" th:field="*{imageUrl}">
        </div>

        <div class="mb-3">
            <label for="categoryId" class="form-label">Danh mục</label>
            <select name="categoryId" id="categoryId" class="form-select">
                <option value="">-- Chọn danh mục --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${product.category != null and product.category.id == cat.id}">
                </option>
            </select>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">Lưu</button>
            <a th:href="@{/products}" class="btn btn-secondary ms-2">Hủy</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
