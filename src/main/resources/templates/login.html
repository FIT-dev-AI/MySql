<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
        }

        .login-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .message {
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
            animation: slideUp 0.4s ease-out;
        }

        .error-message {
            background-color: #fee;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
        }

        .success-message {
            background-color: #efd;
            border-left: 4px solid #27ae60;
            color: #229954;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 20px;
            color: #0f3460;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            color: #1a1a2e;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0f3460;
            box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.1);
            background-color: #f8fbff;
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #0f3460 0%, #533483 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(15, 52, 96, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 52, 96, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 40px 25px;
            }

            .login-title {
                font-size: 24px;
            }

            .logo {
                font-size: 40px;
                margin-bottom: 20px;
            }

            .form-group input {
                padding: 11px 12px 11px 40px;
                font-size: 16px;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-title {
                font-size: 22px;
            }

            .logo {
                font-size: 36px;
                margin-bottom: 15px;
            }

            .login-btn {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">🔐</div>

            <h1 class="login-title">Product Management</h1>
            <p class="login-subtitle">Sign in to your account</p>

            <!-- Error Message -->
            <div th:if="${param.error}" class="message error-message">
                Invalid username or password
            </div>

            <!-- Logout Success Message -->
            <div th:if="${param.logout}" class="message success-message">
                You have been logged out successfully
            </div>

            <!-- Register Success Message -->
            <div th:if="${param.registered}" class="message success-message">
                Registration successful. Please sign in.
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="POST">
                <!-- Username Field -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input 
                            type="text" 
                            name="username" 
                            placeholder="Username" 
                            required 
                            autofocus
                        >
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            name="password" 
                            placeholder="Password" 
                            required
                        >
                    </div>
                </div>

                <!-- Sign In Button -->
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <p style="text-align:center; margin-top:14px; font-size:14px;">
                Don't have an account?
                <a href="/register" style="color:#0f3460; font-weight:600; text-decoration:none;">Register now</a>
            </p>

            <p class="footer-text">© 2026 Product Management System</p>
        </div>
    </div>
</body>
</html>
